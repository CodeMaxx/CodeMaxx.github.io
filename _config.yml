# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: en

# Change to your timezone › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Asia/Kolkata

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Akash Trehan # the main title

tagline: Senior Windows Kernel & Security Engineer at Microsoft # it will display as the subtitle

description: >- # used by seo meta and the atom feed
  Personal blog of Akash Trehan — security, systems, and the occasional detour.

# Fill in the protocol & hostname for your site.
url: "https://www.akashtrehan.com"

github:
  username: CodeMaxx # change to your GitHub username

twitter:
  username: theakashtrehan # change to your Twitter username

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Akash Trehan
  email: me@akashtrehan.com # change to your email address
  fediverse_handle: # fill in your fediverse handle. E.g. "@username@domain.com"
  links:
    # The first element serves as the copyright owner's link
    - https://github.com/CodeMaxx
    - https://twitter.com/theakashtrehan
    - https://www.linkedin.com/in/akash-trehan
    - https://www.facebook.com/theakashtrehan
    - https://www.instagram.com/theakashtrehan
    - https://www.youtube.com/@theakashtrehan

# Site Verification Settings
webmaster_verifications:
  google: # fill in your Google verification code
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id: "G-P6YXLLEDMH" # Google Analytics 4 measurement ID
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Page views settings
pageviews:
  provider: # now only supports 'goatcounter'

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
theme_mode: # [light | dark]

# The CDN endpoint for media resources.
# Empty means media resources are served from this site directly.
cdn:

# the avatar on sidebar, support local or CORS resources
avatar: /assets/images/avatar.png

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
social_preview_image: # string, local or CORS resources

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  # Global switch for the post-comment system. Keeping it empty means disabled.
  provider: disqus # [disqus | utterances | giscus]
  # The provider options are as follows:
  disqus:
    shortname: codemaxx # fill with the Disqus shortname. › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances settings › https://utteranc.es/
  utterances:
    repo:
    issue_term:
  # Giscus options › https://giscus.app
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Self-hosted static assets, optional
assets:
  self_host:
    enabled: # boolean, keep empty means false
    env: # [development | production]

pwa:
  enabled: false # PWA disabled: no service worker, no "update available" prompt
  cache:
    enabled: false # The option for PWA offline cache
    deny_paths:

# The base URL of your site
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # Preserve the legacy Indigo permalink so existing inbound links AND
      # Disqus comment threads (keyed by URL) keep working after the migration.
      permalink: /:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - node_modules
  - vendor
  - scripts
  - Gemfile
  - Gemfile.lock

jekyll-archives:
  enabled: [tags]
  layouts:
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# jekyll-mentions: link @username to GitHub profiles (retained from prior setup)
jekyll-mentions:
  base_url: https://github.com
